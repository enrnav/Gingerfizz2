{% extends "base.html" %}

{% block title %}Iniciar Sesión - GingerFizz{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-12rem)] relative z-10 w-full max-w-[100vw]">
    <div class="w-full max-w-md p-8 bg-white/95 rounded-3xl shadow-2xl animation-fade-in glass-panel relative overflow-hidden">
        <!-- Decoration Drops -->
        <div class="absolute -top-16 -right-16 w-32 h-32 bg-gingerfizz-100 rounded-full blur-2xl opacity-70"></div>
        <div class="absolute -bottom-16 -left-16 w-32 h-32 bg-orange-100 rounded-full blur-2xl opacity-70"></div>
        
        <div class="relative z-10">
            <h2 class="text-3xl font-bold text-center text-gray-800 mb-2">Bienvenido</h2>
            <p class="text-center text-gray-500 mb-8 font-light">Ingresa a tu cuenta para continuar</p>
            
            <form method="POST" class="space-y-6">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-2">Usuario</label>
                    <input type="text" id="username" name="username" required 
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-gingerfizz-500 focus:border-transparent transition-all outline-none bg-gray-50 focus:bg-white"
                        placeholder="Ej. admin">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Contraseña</label>
                    <input type="password" id="password" name="password" required 
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-gingerfizz-500 focus:border-transparent transition-all outline-none bg-gray-50 focus:bg-white"
                        placeholder="••••••••">
                </div>
                
                <button type="submit" 
                    class="w-full py-3 px-4 bg-gingerfizz-500 hover:bg-gingerfizz-600 text-white rounded-xl font-semibold shadow-lg shadow-orange-500/30 transition-all hover:-translate-y-0.5 mt-4">
                    Iniciar Sesión
                </button>
            </form>
            
            <div class="mt-8 text-center">
                <p class="text-sm text-gray-500">
                    ¿No tienes una cuenta? 
                    <a href="{{ url_for('register') }}" class="font-medium text-gingerfizz-600 hover:text-gingerfizz-700 transition-colors">
                        Regístrate
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
